<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets — AdminVU</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-tickets">

    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header class="site-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-dot"></span>
                <span class="logo-text">AdminVU</span>
            </div>
            <nav class="site-nav">
                <a href="index.html"       class="nav-link">Dashboard</a>
                <a href="moderation.html"  class="nav-link">Moderation</a>
                <a href="propagation.html" class="nav-link">Propagation</a>
                <a href="messaging.html"   class="nav-link">Messaging</a>
                <a href="tickets.html"     class="nav-link active">Tickets</a>
            </nav>
            <div class="status-badge">
                <span class="status-dot" id="status-dot"></span>
                <span class="status-label" id="status-label">connecting…</span>
            </div>
        </div>
    </header>

    <main class="main-content">

        <section class="hero">
            <p class="hero-eyebrow">Support Tickets</p>
            <h1 class="hero-title">Tickets</h1>
            <p class="hero-sub">Live view of all support tickets across every server.</p>
        </section>

        <!-- Filters -->
        <div class="filter-bar">
            <div class="filter-group">
                <label class="filter-label">Server</label>
                <select class="filter-select" id="guild-select">
                    <option value="">All servers</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Status</label>
                <div class="tab-bar" id="status-tabs">
                    <button class="tab active" data-status="all">All</button>
                    <button class="tab" data-status="0">Open</button>
                    <button class="tab" data-status="1">In Progress</button>
                    <button class="tab" data-status="2">Pending</button>
                    <button class="tab" data-status="3">Resolved</button>
                    <button class="tab" data-status="4">Closed</button>
                </div>
            </div>
            <button class="btn-refresh" id="refresh-btn">↺ Refresh</button>
        </div>

        <!-- Ticket table -->
        <div class="table-container">
            <div class="table-status" id="table-status">Loading…</div>
            <table class="data-table" id="ticket-table" style="display:none">
                <thead>
                    <tr>
                        <th class="col-id-sm">#</th>
                        <th>Subject</th>
                        <th class="col-id">Server</th>
                        <th class="col-id">Opener</th>
                        <th class="col-id">Assigned</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th class="col-time">Created</th>
                    </tr>
                </thead>
                <tbody id="ticket-tbody"></tbody>
            </table>
        </div>

        <!-- Ticket detail drawer -->
        <div class="detail-drawer" id="detail-drawer" style="display:none">
            <div class="drawer-header">
                <span class="drawer-title" id="drawer-title">Ticket #—</span>
                <button class="drawer-close" id="drawer-close">✕</button>
            </div>
            <div class="drawer-body" id="drawer-body">
                <!-- Populated by JS -->
            </div>
        </div>

    </main>

    <footer class="site-footer">
        <span>running on <span class="mono">127.0.0.1:8080</span></span>
        <span class="footer-sep">&middot;</span>
        <span id="footer-time" class="mono"></span>
    </footer>

    <script src="script.js"></script>
    <script>
    /* ── Tickets page logic ──────────────────────────────────────────── */

    let currentStatus   = 'all';
    let currentGuild    = '';
    let currentTicketId = null;
    let chatPollTimer   = null;
    let chatMode        = 'chat'; /* 'chat' | 'archive' */

    const STATUS_CLASS   = ['status-open','status-progress','status-pending',
                            'status-resolved','status-closed'];
    const PRIORITY_CLASS = ['pri-low','pri-medium','pri-high','pri-urgent'];
    const STATUS_NAMES   = ['Open','In Progress','Pending','Resolved','Closed'];
    const PRIORITY_NAMES = ['Low','Medium','High','Urgent'];

    async function loadGuilds() {
        const guilds = await apiGet('/api/guilds');
        if (!guilds) return;
        const sel = document.getElementById('guild-select');
        guilds.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g.guild_id;
            opt.textContent = `Server ${shortId(g.guild_id)}  (${g.ticket_count} tickets)`;
            sel.appendChild(opt);
        });
    }

    async function loadTickets() {
        const tbody  = document.getElementById('ticket-tbody');
        const table  = document.getElementById('ticket-table');
        const status = document.getElementById('table-status');

        status.textContent = 'Loading…';
        status.style.display = 'block';
        table.style.display  = 'none';
        hideDrawer();

        const params = new URLSearchParams();
        if (currentGuild)              params.set('guild_id', currentGuild);
        if (currentStatus !== 'all')   params.set('status',   currentStatus);

        const data = await apiGet('/api/tickets?' + params.toString());
        if (!data) { status.textContent = 'Failed to load data.'; return; }

        if (data.length === 0) {
            status.textContent = 'No tickets found.';
            return;
        }

        tbody.innerHTML = '';
        data.forEach(t => {
            const tr = document.createElement('tr');
            tr.className = 'clickable-row';
            tr.dataset.ticketId = t.id;
            const sc = STATUS_CLASS[t.status]    || '';
            const pc = PRIORITY_CLASS[t.priority] || '';
            tr.innerHTML = `
                <td class="mono muted">${t.id}</td>
                <td class="subject-cell">${esc(t.subject || '—')}</td>
                <td class="mono muted" title="${t.guild_id}">${shortId(t.guild_id)}</td>
                <td class="mono copyable" title="${t.opener_id}">${shortId(t.opener_id)}</td>
                <td class="mono muted" title="${t.assigned_to}">
                    ${t.assigned_to && t.assigned_to !== '0'
                        ? shortId(t.assigned_to)
                        : '<span class="unassigned">—</span>'}
                </td>
                <td><span class="badge ${sc}">${t.status_name || STATUS_NAMES[t.status] || '?'}</span></td>
                <td><span class="badge ${pc}">${t.priority_name || PRIORITY_NAMES[t.priority] || '?'}</span></td>
                <td class="mono muted">${fmtTs(t.created_at)}</td>
            `;
            tr.addEventListener('click', () => openTicket(t.id, t.status));
            tbody.appendChild(tr);
        });

        status.style.display = 'none';
        table.style.display  = 'table';
    }

    /* ── Ticket detail drawer ──────────────────────────────────────────── */
    async function openTicket(id, statusHint) {
        currentTicketId = id;
        chatMode        = 'chat';

        const drawer = document.getElementById('detail-drawer');
        const title  = document.getElementById('drawer-title');
        const body   = document.getElementById('drawer-body');

        title.textContent = `Ticket #${id}`;
        body.innerHTML    = '<div class="drawer-loading">Loading…</div>';
        drawer.style.display = 'block';

        const t = await apiGet(`/api/tickets/${id}`);
        if (!t || t.error) {
            body.innerHTML = '<div class="drawer-error">Failed to load ticket details.</div>';
            return;
        }

        const sc = STATUS_CLASS[t.status]    || '';
        const pc = PRIORITY_CLASS[t.priority] || '';
        const isClosed = (t.status === 4);

        /* ── Metadata panel ── */
        let html = `
        <div class="detail-grid">
            <div class="detail-row"><span class="detail-label">Subject</span>
                <span class="detail-value">${esc(t.subject || '—')}</span></div>
            <div class="detail-row"><span class="detail-label">Server</span>
                <span class="detail-value mono">${t.guild_id}</span></div>
            <div class="detail-row"><span class="detail-label">Opened by</span>
                <span class="detail-value mono">${t.opener_id}</span></div>
            <div class="detail-row"><span class="detail-label">Assigned to</span>
                <span class="detail-value mono">
                    ${t.assigned_to && t.assigned_to !== '0' ? t.assigned_to : '—'}
                </span></div>
            <div class="detail-row"><span class="detail-label">Status</span>
                <span class="detail-value"><span class="badge ${sc}">${t.status_name || STATUS_NAMES[t.status]}</span></span></div>
            <div class="detail-row"><span class="detail-label">Priority</span>
                <span class="detail-value"><span class="badge ${pc}">${t.priority_name || PRIORITY_NAMES[t.priority]}</span></span></div>
            <div class="detail-row"><span class="detail-label">Outcome</span>
                <span class="detail-value">${esc(t.outcome_name || '—')}</span></div>
            ${t.outcome_notes ? `<div class="detail-row"><span class="detail-label">Outcome notes</span>
                <span class="detail-value">${esc(t.outcome_notes)}</span></div>` : ''}
            <div class="detail-row"><span class="detail-label">Created</span>
                <span class="detail-value mono">${fmtTs(t.created_at)}</span></div>
            <div class="detail-row"><span class="detail-label">Updated</span>
                <span class="detail-value mono">${fmtTs(t.updated_at)}</span></div>
        </div>`;

        /* ── Live chat / archive toggle button ── */
        const chatBtnLabel = isClosed ? '📄 View Archive' : '💬 Live Chat';
        html += `
        <div class="chat-toggle-bar">
            <button class="btn-chat-toggle" id="chat-toggle-btn" onclick="toggleChat(${id}, ${isClosed})">
                ${chatBtnLabel}
            </button>
        </div>

        <!-- Chat / archive pane — hidden until the button is clicked -->
        <div id="chat-pane" style="display:none">
            <div class="chat-header">
                <span class="chat-header-label" id="chat-header-label">
                    ${isClosed ? '📄 Ticket Archive' : '💬 Live Chat'}
                </span>
                ${!isClosed ? '<span class="chat-live-dot">● live</span>' : ''}
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-loading">Loading messages…</div>
            </div>
        </div>`;

        /* Notes */
        const notes = t.notes || [];
        html += `<div class="notes-section">
            <div class="notes-title">Staff Notes (${notes.length})</div>`;
        if (notes.length > 0) {
            notes.forEach(n => {
                html += `
                <div class="note-card ${n.is_pinned ? 'note-pinned' : ''}">
                    <div class="note-meta">
                        ${n.is_pinned ? '<span class="note-pin">📌</span>' : ''}
                        <span class="note-author mono">${n.author_id}</span>
                        <span class="note-time muted">${fmtTs(n.created_at)}</span>
                    </div>
                    <div class="note-content">${esc(n.content)}</div>
                </div>`;
            });
        } else {
            html += '<div class="notes-empty">No staff notes on this ticket.</div>';
        }
        html += '</div>';

        body.innerHTML = html;
    }

    /* ── Chat / archive toggle ─────────────────────────────────────────── */
    function toggleChat(ticketId, isClosed) {
        const pane = document.getElementById('chat-pane');
        const btn  = document.getElementById('chat-toggle-btn');
        if (!pane) return;

        if (pane.style.display === 'none') {
            pane.style.display = 'block';
            if (isClosed) {
                btn.textContent = '✕ Close Archive';
                loadArchive(ticketId);
            } else {
                btn.textContent = '✕ Close Chat';
                loadChat(ticketId);
                startChatPoll(ticketId);
            }
        } else {
            pane.style.display = 'none';
            btn.textContent = isClosed ? '📄 View Archive' : '💬 Live Chat';
            stopChatPoll();
        }
    }

    async function loadChat(ticketId) {
        const el = document.getElementById('chat-messages');
        if (!el) return;
        const data = await apiGet(`/api/tickets/${ticketId}/chat`);
        if (!data) { el.innerHTML = '<div class="chat-error">Failed to load.</div>'; return; }

        const msgs = data.messages || [];
        if (msgs.length === 0) {
            el.innerHTML = '<div class="chat-empty">No messages yet.</div>';
            return;
        }

        const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 20;
        el.innerHTML = msgs.map(m => {
            const dir = m.direction || 'system';
            const classes = {user:'chat-msg-user', staff:'chat-msg-staff', system:'chat-msg-system'};
            const prefix  = {user:'👤 User', staff:'🛡️ Staff', system:'⚙️ System'};
            return `<div class="chat-msg ${classes[dir] || 'chat-msg-system'}">
                <div class="chat-msg-meta">
                    <span class="chat-dir">${prefix[dir] || dir}</span>
                    <span class="chat-ts muted">${fmtTs(m.created_at)}</span>
                </div>
                <div class="chat-msg-body">${esc(m.content || '')}</div>
            </div>`;
        }).join('');

        if (atBottom) el.scrollTop = el.scrollHeight;
    }

    async function loadArchive(ticketId) {
        const el = document.getElementById('chat-messages');
        if (!el) return;
        el.innerHTML = '<div class="chat-loading">Loading archive…</div>';

        /* Archive is served as raw HTML — open it in a new tab for the
         * full self-contained experience (with inline images). */
        window.open(`/api/tickets/${ticketId}/archive`, `ticket-archive-${ticketId}`);
        el.innerHTML = '<div class="chat-empty">Archive opened in a new tab. '
            + `<a href="/api/tickets/${ticketId}/archive" target="_blank">Open again</a></div>`;
    }

    function startChatPoll(ticketId) {
        stopChatPoll();
        chatPollTimer = setInterval(() => loadChat(ticketId), 5000);
    }

    function stopChatPoll() {
        if (chatPollTimer) { clearInterval(chatPollTimer); chatPollTimer = null; }
    }

    /* ── SSE: refresh ticket row + chat pane on ticket_chat events ───── */
    if (window.EventSource) {
        const es = new EventSource('/api/tickets/events');
        es.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'ticket_chat' && msg.ticket_id === currentTicketId) {
                    /* Append single message without a full reload. */
                    const el = document.getElementById('chat-messages');
                    if (el && document.getElementById('chat-pane')?.style.display !== 'none') {
                        const dir = msg.direction || 'system';
                        const classes = {user:'chat-msg-user',staff:'chat-msg-staff',system:'chat-msg-system'};
                        const prefix  = {user:'👤 User',staff:'🛡️ Staff',system:'⚙️ System'};
                        const div = document.createElement('div');
                        div.className = `chat-msg ${classes[dir] || 'chat-msg-system'}`;
                        div.innerHTML = `
                            <div class="chat-msg-meta">
                                <span class="chat-dir">${prefix[dir] || dir}</span>
                                <span class="chat-ts muted">${fmtTs(msg.created_at)}</span>
                            </div>
                            <div class="chat-msg-body">${esc(msg.content || '')}</div>`;
                        el.appendChild(div);
                        el.scrollTop = el.scrollHeight;
                    }
                } else if (msg.type === 'ticket_chat') {
                    /* A different ticket was updated — refresh the list to
                     * reflect any status/priority changes on the row. */
                    loadTickets();
                }
            } catch (_) {}
        };
    }

    function hideDrawer() {
        stopChatPoll();
        currentTicketId = null;
        document.getElementById('detail-drawer').style.display = 'none';
    }

    /* ── Event bindings ───────────────────────────────────────────────── */
    document.getElementById('guild-select').addEventListener('change', e => {
        currentGuild = e.target.value;
        loadTickets();
    });

    document.getElementById('status-tabs').addEventListener('click', e => {
        const btn = e.target.closest('.tab');
        if (!btn) return;
        document.querySelectorAll('#status-tabs .tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = btn.dataset.status;
        loadTickets();
    });

    document.getElementById('refresh-btn').addEventListener('click', loadTickets);
    document.getElementById('drawer-close').addEventListener('click', hideDrawer);

    /* ── Boot ──────────────────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
        startFooterClock();
        setStatus('online');
        loadGuilds();
        loadTickets();
    });
    </script>
</body>
</html>
